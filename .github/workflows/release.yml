name: Release Mod

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Version bump
        run: |
          VERSION=$(grep 'mod_version' gradle.properties | cut -d'=' -f2)
          echo "Current version: $VERSION"

          if [[ $VERSION == *.* ]]; then
            MAJOR=$(echo $VERSION | cut -d'.' -f1)
            MINOR=$(echo $VERSION | cut -d'.' -f2)
            NEW_MINOR=$((MINOR + 1))
            NEW_VERSION="${MAJOR}.${NEW_MINOR}"
          else
            NEW_VERSION=$((VERSION + 1))
          fi

          echo "New version: $NEW_VERSION"

          sed -i "s/mod_version=$VERSION/mod_version=$NEW_VERSION/" gradle.properties

          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV

      - name: Commit and Push new version
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add gradle.properties

          git diff --quiet && git diff --staged --quiet || git commit -m "chore: bump version to ${{ env.NEW_VERSION }}"

          git push origin main

      - name: Build Mod
        run: |
          ./gradlew build remapJar || ./gradlew build

      - name: Show generated artifacts
        run: |
          echo "Generated files:"
          find build -type f \( -name "*.jar" -o -name "*.zip" \)

      - name: Collect artifacts
        run: |
          mkdir -p release-artifacts

          find build -type f \( -name "*.jar" -o -name "*.zip" \) \
            ! -name "*-sources.jar" \
            ! -name "*-javadoc.jar" \
            -exec cp {} release-artifacts/ \;

          ls -R release-artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ env.NEW_VERSION }}"
          name: "Release ${{ env.NEW_VERSION }}"
          draft: false
          prerelease: false
          files: release-artifacts/*
          body: |
            Automatic release for version ${{ env.NEW_VERSION }}.

            Included build artifacts:
            - JAR files
            - Remapped Fabric/Forge builds
            - ZIP distributions (if generated)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
